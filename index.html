<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="dashboard">
            <header class="header">
                <div class="search">
                    <span class="icon">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-search-icon lucide-search"
                        >
                            <title>Search</title>
                            <path d="m21 21-4.34-4.34" />
                            <circle cx="11" cy="11" r="8" />
                        </svg>
                    </span>
                    <input class="search__input" type="search">
                </div>
                <div class="header__profile">
                    <span class="icon">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-bell-ring-icon lucide-bell-ring"
                        >
                            <title>Notification</title>
                            <path d="M10.268 21a2 2 0 0 0 3.464 0" />
                            <path d="M22 8c0-2.3-.8-4.3-2-6" />
                            <path
                                d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"
                            />
                            <path d="M4 2C2.8 3.7 2 5.7 2 8" />
                        </svg>
                    </span>
                    <div class="header__profile--small">
                        <svg
                            width="40"
                            height="40"
                            viewBox="0 0 200 200"
                            role="img"
                            aria-labelledby="profileTitle"
                        >
                            <title id="profileTitle">User profile picture</title>
                            <circle cx="100" cy="100" r="100" fill="#e2e8f0" />
                        </svg>
                    </div>
                    <span class="header__username--small">Morgan Oakley</span>
                </div>
                <div class="header__greeting">
                    <div class="header__profile--big">
                        <svg
                            width="60"
                            height="60"
                            viewBox="0 0 200 200"
                            role="img"
                            aria-labelledby="profileTitle"
                        >
                            <title id="profileTitle">User profile picture</title>
                            <circle cx="100" cy="100" r="100" fill="#e2e8f0" />
                        </svg>
                    </div>

                    <div class="header__message">
                        <span class="header__welcome">Hi there,</span>
                        <span class="header__username--big">Morgan Oakley</span>
                    </div>
                </div>
                <div class="header__action">
                    <button type="button" class="btn">New</button>
                    <button type="button" class="btn">Upload</button>
                    <button type="button" class="btn">Share</button>
                </div>
            </header>
            <aside class="sidebar">
                <header class="sidebar__header">
                    <a class="sidebar__link" href="#">
                        <span class="icon sidebar__logo">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="40"
                                height="40"
                                viewBox="0 0 24 24"
                                fill="currentColor"
                                class="icon-tabler icons-tabler-filled icon-tabler-layout-dashboard"
                            >
                                <title>Dashboard</title>
                                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                <path
                                    d="M9 3a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-4a2 2 0 0 1 -2 -2v-6a2 2 0 0 1 2 -2zm0 12a2 2 0 0 1 2 2v2a2 2 0 0 1 -2 2h-4a2 2 0 0 1 -2 -2v-2a2 2 0 0 1 2 -2zm10 -4a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-4a2 2 0 0 1 -2 -2v-6a2 2 0 0 1 2 -2zm0 -8a2 2 0 0 1 2 2v2a2 2 0 0 1 -2 2h-4a2 2 0 0 1 -2 -2v-2a2 2 0 0 1 2 -2z"
                                />
                            </svg>
                        </span>
                        <span class="sidebar__logo-text">Dashboard</span>
                    </a>
                </header>

                <div class="sidebar__nav">
                    <ul class="sidebar__menu">
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-house-icon lucide-house"
                                    >
                                        <title>Home</title>
                                        <path
                                            d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"
                                        />
                                        <path
                                            d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                                        />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Home</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-id-card-icon lucide-id-card"
                                    >
                                        <title>Profile</title>
                                        <path d="M16 10h2" />
                                        <path d="M16 14h2" />
                                        <path d="M6.17 15a3 3 0 0 1 5.66 0" />
                                        <circle cx="9" cy="11" r="2" />
                                        <rect x="2" y="5" width="20" height="14" rx="2" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Profile</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-message-square-text-icon lucide-message-square-text"
                                    >
                                        <title>Message</title>
                                        <path
                                            d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"
                                        />
                                        <path d="M7 11h10" />
                                        <path d="M7 15h6" />
                                        <path d="M7 7h8" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Messages</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-clock9-icon lucide-clock-9"
                                    >
                                        <title>History</title>
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M12 6v6H8" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">History</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-sticky-note-icon lucide-sticky-note"
                                    >
                                        <title>Tasks</title>
                                        <path
                                            d="M21 9a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 15 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"
                                        />
                                        <path d="M15 3v5a1 1 0 0 0 1 1h5" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Tasks</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke-width="1.5"
                                        stroke="currentColor"
                                        class="size-6"
                                    >
                                        <title>Communities</title>
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"
                                        />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Communities</span>
                            </a>
                        </li>
                    </ul>

                    <ul class="sidebar__menu sidebar__menu--secondary">
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon icon-tabler icons-tabler-outline icon-tabler-settings"
                                    >
                                        <title>Setting</title>
                                        <path
                                            stroke="none"
                                            d="M0 0h24v24H0z"
                                            fill="none"
                                        />
                                        <path
                                            d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065"
                                        />
                                        <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Settings</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-circle-question-mark-icon lucide-circle-question-mark"
                                    >
                                        <title>Support</title>
                                        <circle cx="12" cy="12" r="10" />
                                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                                        <path d="M12 17h.01" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Support</span>
                            </a>
                        </li>

                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-shield-check-icon lucide-shield-check"
                                    >
                                        <title>Privacy</title>
                                        <path
                                            d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"
                                        />
                                        <path d="m9 12 2 2 4-4" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Privacy</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </aside>
            <main class="main"><aside class=""></aside></main>
        </div>
    </body>
</html>
